<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>BMpro Rent - Listing Properti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: #f4f7f6;
      color: #10201d;
      padding-bottom: 92px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid #dce9e5;
      backdrop-filter: blur(16px);
    }

    .brand {
      min-width: 0;
    }

    .brand strong {
      display: block;
      font-size: 0.96rem;
      line-height: 1.2;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: #617a73;
      font-size: 0.72rem;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: #e3efeb;
      color: #0f766e;
      text-decoration: none;
      cursor: pointer;
    }

    .shell {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .hero {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
      padding: 18px;
      border-radius: 8px;
      background: #0f766e;
      color: #fff;
      box-shadow: 0 14px 40px rgba(15, 118, 110, 0.18);
    }

    .hero h1 {
      font-size: clamp(1.45rem, 4vw, 2.2rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 720px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .search-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px;
      gap: 10px;
    }

    .input-wrap {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.14);
    }

    .input-wrap i {
      color: rgba(255, 255, 255, 0.8);
    }

    .input-wrap input,
    .input-wrap select {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font: inherit;
      font-size: 0.86rem;
    }

    .input-wrap select option {
      color: #10201d;
    }

    .input-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .summary-item {
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
    }

    .summary-item span {
      display: block;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.66rem;
    }

    .summary-item strong {
      display: block;
      margin-top: 4px;
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .property-card {
      display: grid;
      overflow: hidden;
      border: 1px solid #dce9e5;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 34px rgba(34, 62, 56, 0.07);
    }

    .image-wrap {
      position: relative;
      background: #dce9e5;
    }

    .property-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 8px;
      background: rgba(15, 118, 110, 0.94);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: capitalize;
    }

    .featured {
      left: auto;
      right: 10px;
      background: rgba(217, 119, 6, 0.94);
    }

    .card-body {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .location {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      color: #617a73;
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .price {
      color: #0f766e;
      font-size: 1.12rem;
      font-weight: 800;
    }

    .price span {
      color: #617a73;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .specs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .spec {
      min-height: 54px;
      display: grid;
      place-items: center;
      gap: 3px;
      padding: 7px 4px;
      border: 1px solid #dce9e5;
      border-radius: 8px;
      background: #f8fbfa;
      text-align: center;
    }

    .spec i {
      color: #0f766e;
      font-size: 0.82rem;
    }

    .spec strong {
      font-size: 0.78rem;
    }

    .spec span {
      color: #617a73;
      font-size: 0.58rem;
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 8px;
      margin-top: 2px;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 8px;
      padding: 0 12px;
      background: #0f766e;
      color: #fff;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .btn.secondary {
      background: #e3efeb;
      color: #0f766e;
    }

    .state {
      display: grid;
      place-items: center;
      min-height: 300px;
      padding: 22px;
      text-align: center;
    }

    .state-box {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid #dce9e5;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 34px rgba(34, 62, 56, 0.08);
    }

    .state-box i {
      margin-bottom: 10px;
      color: #0f766e;
      font-size: 2rem;
    }

    .state-box h2 {
      font-size: 1.1rem;
      margin-bottom: 7px;
    }

    .state-box p {
      color: #617a73;
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 9px 14px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid #dce9e5;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      box-shadow: 0 -12px 32px rgba(34, 62, 56, 0.08);
    }

    .nav-item {
      min-height: 52px;
      display: grid;
      place-items: center;
      gap: 3px;
      border-radius: 8px;
      color: #617a73;
      text-decoration: none;
      font-size: 0.66rem;
      font-weight: 800;
    }

    .nav-item i {
      font-size: 1.15rem;
    }

    .nav-item.active,
    .nav-item.primary {
      color: #0f766e;
      background: #e3efeb;
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .search-panel,
      .summary,
      .grid {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>BMpro Rent</strong>
      <span>Listing dari tab rent_property</span>
    </div>
    <button class="icon-btn" type="button" id="refreshBtn" aria-label="Refresh data">
      <i class="fas fa-rotate-right"></i>
    </button>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <h1>Daftar properti sewa</h1>
        <p>Halaman ini membaca semua data dari Google Sheet tab rent_property lewat OpenSheet untuk tes cepat hasil posting host.</p>
      </div>

      <div class="search-panel">
        <label class="input-wrap">
          <i class="fas fa-search"></i>
          <input id="searchInput" type="search" placeholder="Cari nama properti, lokasi, host...">
        </label>
        <label class="input-wrap">
          <i class="fas fa-filter"></i>
          <select id="statusFilter">
            <option value="">Semua status</option>
            <option value="active">Active</option>
            <option value="draft">Draft</option>
            <option value="inactive">Inactive</option>
          </select>
        </label>
      </div>

      <div class="summary">
        <div class="summary-item">
          <span>Total Listing</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="summary-item">
          <span>Active</span>
          <strong id="activeCount">0</strong>
        </div>
        <div class="summary-item">
          <span>Featured</span>
          <strong id="featuredCount">0</strong>
        </div>
      </div>
    </section>

    <section id="propertyList">
      <div class="state">
        <div class="state-box">
          <i class="fas fa-spinner fa-spin"></i>
          <h2>Memuat listing</h2>
          <p>Data sedang diambil dari OpenSheet.</p>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="nav-item active" href="view_detail_rent.html">
      <i class="fas fa-house"></i>
      <span>Listing</span>
    </a>
    <a class="nav-item primary" href="form_detail_rent.html">
      <i class="fas fa-plus-circle"></i>
      <span>Tambah Property</span>
    </a>
    <button class="nav-item" type="button" id="footerRefresh">
      <i class="fas fa-rotate-right"></i>
      <span>Refresh</span>
    </button>
  </nav>

  <script>
    const SPREADSHEET_ID = '1l8-ndY78xzXmsGu0k2ILgBjkVE3ty9tWB-FyKjnyHSA';
    const OPENSHEET_URL = `https://opensheet.elk.sh/${SPREADSHEET_ID}/rent_property`;
    const FALLBACK_IMAGE = 'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=900&auto=format&fit=crop';

    const propertyList = document.getElementById('propertyList');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const totalCount = document.getElementById('totalCount');
    const activeCount = document.getElementById('activeCount');
    const featuredCount = document.getElementById('featuredCount');
    const refreshBtn = document.getElementById('refreshBtn');
    const footerRefresh = document.getElementById('footerRefresh');

    let properties = [];

    function text(value, fallback = '') {
      const clean = String(value || '').trim();
      return clean || fallback;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatRupiah(value) {
      const number = Number(String(value || '').replace(/\D/g, ''));
      if (!number) return 'Harga belum tersedia';
      return 'Rp ' + number.toLocaleString('id-ID');
    }

    function normalize(value) {
      return String(value || '').trim().toLowerCase();
    }

    function phoneHref(phone) {
      const cleaned = String(phone || '').replace(/\D/g, '');
      if (!cleaned) return '';
      if (cleaned.startsWith('62')) return cleaned;
      if (cleaned.startsWith('0')) return '62' + cleaned.slice(1);
      return '62' + cleaned;
    }

    function showState(icon, title, message) {
      propertyList.innerHTML = `
        <div class="state">
          <div class="state-box">
            <i class="${icon}"></i>
            <h2>${escapeHtml(title)}</h2>
            <p>${escapeHtml(message)}</p>
          </div>
        </div>
      `;
    }

    function updateSummary(list) {
      totalCount.textContent = properties.length;
      activeCount.textContent = properties.filter(item => normalize(item.status || 'active') === 'active').length;
      featuredCount.textContent = properties.filter(item => normalize(item.featured) === 'yes').length;
      document.title = `BMpro Rent - ${list.length} Listing`;
    }

    function getFilteredProperties() {
      const keyword = normalize(searchInput.value);
      const status = normalize(statusFilter.value);

      return properties.filter(item => {
        const haystack = [
          item.nama_property,
          item.lokasi,
          item.alamat,
          item.sales,
          item.room_type,
          item.kategori
        ].map(normalize).join(' ');

        const statusValue = normalize(item.status || 'active');
        const matchKeyword = !keyword || haystack.includes(keyword);
        const matchStatus = !status || statusValue === status;
        return matchKeyword && matchStatus;
      });
    }

    function renderProperties() {
      const filtered = getFilteredProperties();
      updateSummary(filtered);

      if (!properties.length) {
        showState('fas fa-house-circle-xmark', 'Belum ada listing', 'Data di tab rent_property masih kosong atau belum terbaca oleh OpenSheet.');
        return;
      }

      if (!filtered.length) {
        showState('fas fa-magnifying-glass', 'Listing tidak ditemukan', 'Coba ubah kata kunci atau filter status.');
        return;
      }

      propertyList.innerHTML = `
        <div class="grid">
          ${filtered.map(renderCard).join('')}
        </div>
      `;
    }

    function renderCard(property) {
        const fileId =
        (property.gambar_utama || '')
            .split('id=')[1];

        const image =
        fileId
            ? `https://lh3.googleusercontent.com/d/${fileId}`
            : FALLBACK_IMAGE;
            
      const title = text(property.nama_property, 'Properti tanpa nama');
      const status = text(property.status, 'active');
      const contact = phoneHref(property.kontak || property.sales_phone);
      const featured = normalize(property.featured) === 'yes';

      return `
        <article class="property-card">
          <div class="image-wrap">
            <img class="property-image" src="${escapeHtml(image)}" alt="${escapeHtml(title)}" onerror="this.src='${FALLBACK_IMAGE}'">
            <span class="badge"><i class="fas fa-circle"></i>${escapeHtml(status)}</span>
            ${featured ? '<span class="badge featured"><i class="fas fa-star"></i>Featured</span>' : ''}
          </div>
          <div class="card-body">
            <div>
              <h2 class="card-title">${escapeHtml(title)}</h2>
              <div class="location">
                <i class="fas fa-location-dot"></i>
                <span>${escapeHtml(text(property.lokasi, 'Lokasi belum tersedia'))}</span>
              </div>
            </div>

            <div class="price">${formatRupiah(property.harga_malam)} <span>/ malam</span></div>

            <div class="specs">
              <div class="spec"><i class="fas fa-bed"></i><strong>${escapeHtml(text(property.kt, '0'))}</strong><span>KT</span></div>
              <div class="spec"><i class="fas fa-bath"></i><strong>${escapeHtml(text(property.km, '0'))}</strong><span>KM</span></div>
              <div class="spec"><i class="fas fa-ruler-combined"></i><strong>${escapeHtml(text(property.lt, '0'))}</strong><span>Luas</span></div>
              <div class="spec"><i class="fas fa-users"></i><strong>${escapeHtml(text(property.maximum_guest, '0'))}</strong><span>Tamu</span></div>
            </div>

            <div class="actions">
            ${contact ? `
                <a
                class="btn"
                href="https://wa.me/${contact}"
                target="_blank"
                rel="noopener"
                >
                <i class="fab fa-whatsapp"></i>
                Hubungi Host
                </a>
            ` : `
                <button
                class="btn"
                type="button"
                disabled
                >
                <i class="fas fa-phone"></i>
                Kontak Kosong
                </button>
            `}

            <a
                class="btn secondary"
                href="detail_rent.html?id=${property.property_id}"
            >
                <i class="fas fa-eye"></i>
                Detail
            </a>

            </div>
        </article>
      `;
    }

    async function loadProperties() {
      showState('fas fa-spinner fa-spin', 'Memuat listing', 'Data sedang diambil dari OpenSheet.');

      try {
        const response = await fetch(OPENSHEET_URL);
        if (!response.ok) throw new Error('Gagal membaca OpenSheet.');

        const data = await response.json();
        properties = Array.isArray(data) ? data : [];
        renderProperties();
      } catch (error) {
        console.error(error);
        showState('fas fa-triangle-exclamation', 'Gagal memuat listing', error.message || 'Terjadi kesalahan saat mengambil data.');
      }
    }

    searchInput.addEventListener('input', renderProperties);
    statusFilter.addEventListener('change', renderProperties);
    refreshBtn.addEventListener('click', loadProperties);
    footerRefresh.addEventListener('click', loadProperties);

    loadProperties();
  </script>
</body>
</html>
